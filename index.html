<!-- Divisor decorativo tipo teclas de marimba (reutilizado entre secciones) -->
<template id="marimba-divider-template">

    <span></span><span></span><span></span><span></span><span></span><span></span><span></span><span></span><span></span><span></span><span></span><span></span>
  </div>
</template>

<div class="grain-overlay" aria-hidden="true"></div>

<header class="hero" id="top">
  <div class="hero__media">
    <img src="images/hero-beach.jpg" alt="" class="hero__img" width="893" height="1600" fetchpriority="high">
    <div class="hero__scrim"></div>
  </div>

  <button class="hero__menu-btn" id="hero-menu-btn" type="button" aria-haspopup="true" aria-expanded="false" aria-controls="quick-nav" aria-label="Abrir menú rápido de secciones">
    <img src="images/shrimp-icon.png" alt="" class="hero__menu-btn-img">
  </button>

  <div class="hero__content">
    <div class="hero__brand">
      <img src="images/logo-gold.png" alt="Iglesia Lluvias De Bendiciones · Cruzada Cristiana" class="hero__brand-logo">
    </div>
    <h1 class="hero__title">Gran Kermes</h1>
    <p class="hero__subtitle">Sabores del Pacífico Colombiano</p>
    <p class="hero__schedule" id="hero-schedule">Este domingo</p>
    <a href="#menu-start" class="hero__cta">
      Ver el menú
      <svg width="18" height="18"><use href="#icon-chevron"/></svg>
    </a>
  </div>
</header>

<div class="quick-nav" id="quick-nav" aria-hidden="true">
  <div class="quick-nav__backdrop" data-quicknav-close></div>
  <div class="quick-nav__panel" role="dialog" aria-modal="true" aria-label="Ir a una sección del menú">
    <div class="quick-nav__head">
      <span class="quick-nav__title">Ir directo a…</span>
      <button class="quick-nav__close" type="button" data-quicknav-close aria-label="Cerrar menú rápido">
        <svg width="20" height="20"><use href="#icon-close"/></svg>
      </button>
    </div>
    <div class="quick-nav__list" id="quick-nav-list"></div>
    <div class="quick-nav__brand">
      <img src="images/logo-gold.png" alt="Iglesia Lluvias De Bendiciones · Cruzada Cristiana">
    </div>
  </div>
</div>

<div class="dish-modal" id="dish-modal" aria-hidden="true">
  <div class="dish-modal__backdrop" data-dishmodal-close></div>
  <div class="dish-modal__panel" role="dialog" aria-modal="true" aria-labelledby="dish-modal-name">
    <button class="dish-modal__close" type="button" data-dishmodal-close aria-label="Cerrar">
      <svg width="20" height="20"><use href="#icon-close"/></svg>
    </button>
    <div class="dish-modal__scroll">
      <div class="dish-modal__gallery">
        <div class="dish-modal__track" id="dish-modal-track"></div>
        <div class="dish-modal__dots" id="dish-modal-dots"></div>
        <span class="dish-modal__price" id="dish-modal-price"></span>
      </div>
      <div class="dish-modal__body">
        <h3 class="dish-modal__name" id="dish-modal-name"></h3>
        <p class="dish-modal__desc" id="dish-modal-desc"></p>
      </div>
    </div>
  </div>
</div>

<nav class="catnav" id="catnav" aria-label="Categorías del menú">
  <div class="catnav__track" id="catnav-track"></div>
</nav>

<main id="menu-start">
  <div id="menu-sections"></div>

  <section class="porciones" id="porciones" aria-labelledby="porciones-title">
    <div class="section-head">
      <span class="section-head__eyebrow">También puedes pedir</span>
      <h2 class="section-head__title" id="porciones-title">Porciones sueltas</h2>
    </div>
    <div class="board" id="porciones-board"></div>
  </section>
</main>

<footer class="site-footer">
  <div class="divider-slot" id="footer-divider-slot"></div>
  <div class="site-footer__content">
    <p class="site-footer__org">Gran Kermes · Iglesia Lluvias de Bendición</p>
    <p class="site-footer__tag">Con sazón del Pacífico, para bendecir a la familia de la iglesia.</p>
  </div>
</footer>

<div class="delivery-fab" id="delivery-fab">
  <div class="delivery-fab__actions" id="delivery-fab-actions">
    <span class="delivery-fab__label">Domicilio</span>
    <a class="delivery-fab__action" id="delivery-fab-whatsapp" href="#" target="_blank" rel="noopener" aria-label="Escribir por WhatsApp para domicilio">
      <span>WhatsApp</span>
      <svg width="20" height="20"><use href="#icon-whatsapp"/></svg>
    </a>
    <a class="delivery-fab__action" id="delivery-fab-call" href="#" aria-label="Llamar para domicilio">
      <span>Llamar</span>
      <svg width="20" height="20"><use href="#icon-phone"/></svg>
    </a>
  </div>
  <button class="delivery-fab__main" id="delivery-fab-btn" type="button" aria-haspopup="true" aria-expanded="false" aria-label="Opciones de domicilio">
    <svg width="26" height="26"><use href="#icon-moto"/></svg>
  </button>
</div>
